<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Barebones Page</title>
    <link rel="stylesheet" href="/lightbox2/css/lightbox.min.css" />
    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://unpkg.com/masonry-layout@4/dist/masonry.pkgd.js"></script>
    <style>
      .grid-item { width: 200px; margin-bottom: 10px; }

      .grid-item--width2 { width: 400px; }
      .grid-item img {
        width: 100%;
        display: block;
        transition: transform 0.4s ease;
      }
      .grid-item img:hover {
        transform: scale(1.08);
      }
      body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; color: #2a241d; background: #faf6f0; }
      .hero {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 80px 24px;
        box-sizing: border-box;
        background: linear-gradient(180deg, #faf6f0 0%, #f3ebdd 100%);
      }
      .hero h1 {
        font-size: clamp(2.5rem, 6vw, 4.5rem);
        font-weight: 600;
        letter-spacing: -0.02em;
        margin: 0 0 32px;
        line-height: 1.1;
      }
      .hero img.hero-image {
        width: min(420px, 80%);
        height: auto;
        border-radius: 16px;
        box-shadow: 0 20px 60px -20px rgba(80, 60, 30, 0.35);
        margin-bottom: 32px;
        display: block;
      }
      .hero p {
        max-width: 640px;
        font-size: clamp(1rem, 1.6vw, 1.15rem);
        line-height: 1.7;
        color: #5a4f42;
        margin: 0 auto;
      }
      .gallery-section { padding: 40px 24px; }
      .gallery-section h2 {
        text-align: center;
        font-size: 2rem;
        font-weight: 600;
        margin: 0 0 32px;
      }
    </style>
  </head>
  <body>
    <section class="hero">
      <h1>The Solara Circle</h1>
      <img
        class="hero-image"
        src="/hero/group_stretch.jpg"
        alt="Group of people practicing yoga together in a sunlit meadow at sunrise"
      />
      <p>
        The Solara Circle is your community for inspiration and connection. See what your community is practicing right
        now, share your own journey, and draw strength from a supportive Solara community that shows up for each other
        every day.
      </p>
    </section>
    <section class="gallery-section">
      <div class="grid">
        <div class="grid-item" data-aos="fade-up" data-aos-duration="2000" data-aos-delay="200">
          >
          <a
            href="/large/handfoot_stretch_wesley-tingey--nZynZmR3Ls-unsplash-3.jpg"
            data-lightbox="gallery"
            data-title="Deep Balance Pose"
            ><img
              src="/grid/handfoot_stretch.jpg"
              alt="woman standing on one leg while pulling other leg straight up over her head"
          /></a>
        </div>
        <div class="grid-item grid-item--width2" data-aos="fade-up" data-aos-duration="2000" data-aos-delay="200">
          <a
            href="/large/mountain_sun_luke-richardson-dI7vfR1Bqcg-unsplash-3.jpg"
            data-lightbox="gallery"
            data-title="Mountain Gorge Sunrise"
            ><img src="/grid/mountain_sun.jpg" alt="sunrise over mountain gorge"
          /></a>
        </div>
        <div class="grid-item" data-aos="fade-up" data-aos-duration="2000" data-aos-delay="200">
          <a
            href="/large/stretch_braid_luemen-rutkowski-mIHbipd5-Qw-unsplash-3.jpg"
            data-lightbox="gallery"
            data-title="Outdoor Nature Stretch"
            ><img src="/grid/stretch_braid.jpg" alt="woman stretching in nature"
          /></a>
        </div>
        <div class="grid-item" data-aos="fade-up" data-aos-duration="2000" data-aos-delay="200">
          <a
            href="/large/Surya_namaskar_at_the_sea_shore-3.jpg"
            data-lightbox="gallery"
            data-title="Seashore Surya Namaskar"
            ><img
              src="/grid/surya_namaskar.jpg"
              alt="man standing with arms over head, palms touching and leg bent on side of knee at sunrise on seashore with waves"
          /></a>
        </div>
        <div class="grid-item grid-item--width2" data-aos="fade-up" data-aos-duration="2000" data-aos-delay="200">
          <a
            href="/large/best_community_pexels-silverkblack-36715242-4.jpg"
            data-lightbox="gallery"
            data-title="Partner Stretch Practice"
            ><img
              src="/grid/best_community.jpg"
              alt="2 people sitting outdoors and stretching with hands and feet together"
          /></a>
        </div>
        <div class="grid-item" data-aos="fade-up" data-aos-duration="2000" data-aos-delay="200">
          <a
            href="/large/communit_stretch_towards_pexels-silverkblack-36715217-3.jpg"
            data-lightbox="gallery"
            data-title="Community Outreach Stretching"
            ><img
              src="/grid/community_stretch.jpg"
              alt="2 people standing outdoors and stretching towards eachother with arms straight out"
          /></a>
        </div>
        <div class="grid-item" data-aos="fade-up" data-aos-duration="2000" data-aos-delay="200">
          <a
            href="/large/editbehnam-samipour-SBvW39-W60I-unsplash-3.jpg"
            data-lightbox="gallery"
            data-title="Midday Sun Meditation"
            ><img src="/grid/edit_behnam.jpg" alt="woman smiling with face turned toward sun in a field"
          /></a>
        </div>
        <div class="grid-item grid-item--width2" data-aos="fade-up" data-aos-duration="2000" data-aos-delay="200">
          <a
            href="/large/girl_trampoline_pexels-ron-lach-10045070-3.jpg"
            data-lightbox="gallery"
            data-title="Rebounding Exercise"
            ><img src="/grid/girl_trampoline.jpg" alt="girl smiling while jumping on mini trampoline"
          /></a>
        </div>
        <div class="grid-item" data-aos="fade-up" data-aos-duration="2000" data-aos-delay="200">
          <a
            href="/large/goldenhill_sun-john-towner-CakC6u4d95g-unsplash-3.jpg"
            data-lightbox="gallery"
            data-title="Sunrise at Golden Hill"
            ><img
              src="/grid/goldenhill_sun.jpg"
              alt="silhoutte of people standing on mountain looking at sunrise over ocean"
          /></a>
        </div>
        <div class="grid-item" data-aos="fade-up" data-aos-duration="2000" data-aos-delay="200">
          <a
            href="/large/greendress_feet_conikal-ft7WMh4T_AQ-unsplash-3.jpg"
            data-lightbox="gallery"
            data-title="Barefoot Stream Walk"
            ><img
              src="/grid/greendress_feet.jpg"
              alt="woman in green dress walking in green jungle with barefeet in stream"
          /></a>
        </div>
      </div>
    </section>
    <script>
      window.onload = function () {
        $('.grid').masonry({
          itemSelector: '.grid-item',
          columnWidth: 200,
          gutter: 10
        });
      };
    </script>
    <script src="/lightbox2/js/lightbox.min.js"></script>
    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
    <script>
           AOS.init({
            once: true,
            easing: 'ease-in-sine'
      });
    </script>
  </body>
</html>
